<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CpQ's Website — 布局优化版</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        background-color: #eee;
        font-family: system-ui, sans-serif;
      }
      .flex {
        display: flex;
      }
      .column {
        flex-direction: column;
      }
      .baise {
        background-color: #fff;
      }
      .shadow {
        box-shadow:
          0 3px 6px rgba(0, 0, 0, 0.16),
          0 3px 6px rgba(0, 0, 0, 0.23);
      }
      .flex1 {
        flex: 1;
      }

      .daohang {
        padding: 10px 20px;
        border-bottom: 1px solid gray;
      }
      .mg8 {
        margin: 8px;
      }
      .mgr8 {
        margin-right: 8px;
      }
      .mgt8 {
        margin-top: 8px;
      }
      .neirong {
        overflow: hidden; 
      }
      @media (max-width: 768px) {
        .cebian {
          display: none;
        }
        .neirong {
          flex-direction: column;
          overflow: auto; 
        }
        .youqu {
          margin-left: 8px;
        }
      }
    </style>
  </head>
  <body class="flex">
    <!--左侧边栏-->
    <div
      style="width: 200px; flex-shrink: 0; z-index: 2"
      class="cebian baise shadow"
    >
      <div
        style="
          padding: 10px;
          align-items: center;
          justify-content: center;
          border-bottom: 1px solid black;
        "
        class="flex"
      >
        <img src="soly.png" width="60" height="60" />
        <div style="margin-left: 10px">CpQ</div>
      </div>
      <div class="flex1">
        <div class="daohang">导航</div>
        <div class="daohang">导航</div>
        <div class="daohang">导航</div>
        <div class="daohang">导航</div>
        <div class="daohang">导航</div>
      </div>
    </div>

    <!--主区域-->
    <div class="flex1 flex column" style="overflow: hidden">
      <!--头部-->
      <div
        style="height: 60px; flex-shrink: 0; z-index: 1"
        class="baise shadow"
      ></div>

      <!--内容主体(neirong)-->
      <div class="neirong flex1 flex" style="min-height: 0">
        <!--中区域-->
        <div
          style="flex: 3; display: flex; flex-direction: column; min-height: 0"
          class="mg8"
        >
          <!--滚动容器-->
          <div
            style="
              flex: 1;
              overflow-y: auto;
              min-height: 0;
              padding: 0 4px 4px 8px;
            "
          >
            <!--数据块-->
            <div class="flex" style="flex-shrink: 0">
              <div style="height: 100px" class="flex1 baise mgr8 shadow"></div>
              <div style="height: 100px" class="flex1 baise mgr8 shadow"></div>
              <div style="height: 100px" class="flex1 baise shadow"></div>
            </div>
            <!--正文区-->
            <div style="min-height: 500px" class="baise mgt8 shadow">
              <!--占位文字-->
              <div style="padding: 20px">
                <p style="line-height: 1.8">
                  这里是正文内容。添加点击上方数据块以及点击左侧导航栏跳转对应内容的联动。
                </p>
              </div>
            </div>
          </div>
          <!--滚动容器结束-->
          <!--底部栏-->
          <div
            style="height: 30px; flex-shrink: 0; border-top: 1px solid #ddd"
            class="baise mgt8 shadow"
          ></div>
        </div>
        <!--中区域结束-->
        <!--右区域-->
        <div
          style="flex: 1; display: flex; flex-direction: column; min-height: 0"
          class="youqu mgr8 mgt8"
        >
          <!--闲话区-->
          <div style="height: 150px; flex-shrink: 0" class="baise shadow">
            <div style="padding: 10px">广告位招租</div>
          </div>
          <!--广告区-->
          <div
            style="height: 300px; flex-shrink: 0; margin-top: 8px"
            class="baise shadow"
          >
            <div style="padding: 10px">留言区（留言会在我这里显示）</div>
          </div>
        </div>
      </div>
      <!--内容主体区结束-->
    </div>
    <!-- 主区域结束 -->
  </body>
</html>
